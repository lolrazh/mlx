# Spoke fine-tuning config for mlx_lm.lora
# Usage: caffeinate -dims mlx_lm.lora -c spoke/config.yaml
#
# Qwen3-1.7B-T1: Identical to T2-v4 (100% run) except model size.
# Changed: model (4B→1.7B), num_layers (36→28), adapter_path.
# Everything else is EXACTLY T2-v4.

model: Qwen/Qwen3-1.7B-MLX-bf16
train: true
data: ./spoke/data/v4
fine_tune_type: lora
mask_prompt: true
optimizer: adam

# LoRA hyperparameters — identical to T2-v4
lora_parameters:
  rank: 8
  scale: 2.0        # alpha = rank * scale = 16
  dropout: 0.05

# Training — identical to T2-v4
batch_size: 4
grad_checkpoint: false
iters: 2000
learning_rate: 1e-5
num_layers: 28       # all 28 layers (T2-v4 used all 36 of the 4B model)
max_seq_length: 512  # T2-v4 used 512. Data max is 227 tokens.

# Reporting
steps_per_report: 10
steps_per_eval: 50
save_every: 100
report_to: wandb

# Paths
adapter_path: ./spoke/adapters-qwen3-1.7b-t1

seed: 42
