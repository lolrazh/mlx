# Spoke fine-tuning config for mlx_lm.lora
# Usage: caffeinate -dims mlx_lm.lora -c spoke/config.yaml
#
# T3: Qwen3-4B + V5 data (1287 train) + v3 prompt (191 tok).
# Same hyperparams as T2-v4 (100% run). New: richer training prompt, 86 targeted examples.

model: mlx-community/Qwen3-4B-Instruct-2507-bf16
train: true
data: ./spoke/data/v5
fine_tune_type: lora
mask_prompt: true
optimizer: adam

# LoRA hyperparameters — identical to T2-v4
lora_parameters:
  rank: 8
  scale: 2.0        # alpha = rank * scale = 16
  dropout: 0.05

# Training — identical to T2-v4
batch_size: 4
grad_checkpoint: true
iters: 2000
learning_rate: 1e-5
num_layers: 36       # all 36 layers
max_seq_length: 512  # T2-v4 used 512. Data max is 227 tokens.

# Reporting
steps_per_report: 10
steps_per_eval: 50
save_every: 100
report_to: wandb

# Paths
adapter_path: ./spoke/adapters-qwen3-t3

seed: 42
