# Spoke fine-tuning config for mlx_lm.lora
# Usage: caffeinate -dims mlx_lm.lora -c spoke/config.yaml

model: mlx-community/Qwen3-4B-Instruct-2507-bf16
train: true
data: ./spoke/data/v3
fine_tune_type: lora
mask_prompt: true
optimizer: adam

# LoRA hyperparameters
lora_parameters:
  rank: 8
  scale: 2.0        # alpha = rank * scale = 16
  dropout: 0.05

# Training
batch_size: 4
iters: 2000          # T11-ext: 2000 iters on v3 (535 train). ~15 epochs. T11 was only 300 iters (~2.4 epochs).
learning_rate: 1e-5
num_layers: 36       # all 36 layers
max_seq_length: 512  # transcripts are short

# Reporting
steps_per_report: 10
steps_per_eval: 50
save_every: 100
report_to: wandb

# Paths
adapter_path: ./spoke/adapters-qwen3-t11ext

seed: 42
