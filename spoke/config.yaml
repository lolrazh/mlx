# Spoke fine-tuning config for mlx_lm.lora
# Usage: caffeinate -dims mlx_lm.lora -c spoke/config.yaml

model: mlx-community/Qwen3-4B-Instruct-2507-bf16
train: true
data: ./spoke/data/v4
fine_tune_type: lora
mask_prompt: true
optimizer: adam

# LoRA hyperparameters
lora_parameters:
  rank: 8
  scale: 2.0        # alpha = rank * scale = 16
  dropout: 0.05

# Training
batch_size: 4
grad_checkpoint: false  # bf16 Qwen3 peaks ~18.6 GB on 24 GB M4 — tight but fits
iters: 1000          # Speed test: bf16 + short seq + 16 layers. Compare it/sec vs T2-v4.
learning_rate: 1e-5
num_layers: 16       # top 16 layers only (vs 36 in T2-v4). Test if accuracy holds.
max_seq_length: 256  # actual data max is 227 tokens. Was 512 = 56% wasted padding.

# Reporting
steps_per_report: 10
steps_per_eval: 50
save_every: 100
report_to: wandb

# Paths
adapter_path: ./spoke/adapters-qwen3-speed

seed: 42
