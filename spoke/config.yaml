# Spoke fine-tuning config for mlx_lm.lora
# Usage: caffeinate -dims mlx_lm.lora -c spoke/config.yaml

model: mlx-community/Llama-3.2-3B-Instruct-bf16
train: true
data: ./spoke/data/v4
fine_tune_type: lora
mask_prompt: true
optimizer: adam

# LoRA hyperparameters
lora_parameters:
  rank: 8
  scale: 2.0        # alpha = rank * scale = 16
  dropout: 0.05

# Training
batch_size: 4
grad_checkpoint: false  # Llama 3.2 3B fits in ~15 GB without it
iters: 2000          # Llama3-T2: 2000 iters on v4 (1201 train). ~6.7 epochs.
learning_rate: 1e-5
num_layers: 28       # all 28 Llama 3.2 3B layers
max_seq_length: 512  # transcripts are short

# Reporting
steps_per_report: 10
steps_per_eval: 50
save_every: 100
report_to: wandb

# Paths
adapter_path: ./spoke/adapters-llama3-t2

seed: 42
