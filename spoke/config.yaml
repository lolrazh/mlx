# Spoke fine-tuning config for mlx_lm.lora
# Usage: caffeinate -dims mlx_lm.lora -c spoke/config.yaml

model: mlx-community/Qwen3-4B-Instruct-2507-8bit
train: true
data: ./spoke/data/v4
fine_tune_type: lora
mask_prompt: true
optimizer: adam

# LoRA hyperparameters
lora_parameters:
  rank: 8
  scale: 2.0        # alpha = rank * scale = 16
  dropout: 0.05

# Training
batch_size: 4
grad_checkpoint: false  # 8-bit Qwen3 should use ~12 GB (vs 18.6 for bf16)
iters: 1000          # Qwen3-8bit test: 1000 iters. Compare against bf16 T2-v4 at same point.
learning_rate: 1e-5
num_layers: 36       # all 36 Qwen3 layers
max_seq_length: 512  # transcripts are short

# Reporting
steps_per_report: 10
steps_per_eval: 50
save_every: 100
report_to: wandb

# Paths
adapter_path: ./spoke/adapters-qwen3-8bit

seed: 42
