# Spoke fine-tuning config for mlx_lm.lora
# Usage: caffeinate -dims mlx_lm.lora -c spoke/config.yaml

model: mlx-community/LFM2-2.6B-Exp-bf16
train: true
data: ./spoke/data/v3
fine_tune_type: lora
mask_prompt: true
optimizer: adam

# LoRA hyperparameters
lora_parameters:
  rank: 8
  scale: 2.0        # alpha = rank * scale = 16
  dropout: 0.05

# Training
batch_size: 4
iters: 2000          # LFM2-T1b: extended from 800. Val loss still dropping (0.480), no overfit. YOLO.
learning_rate: 1e-5
num_layers: 30       # all 30 layers (only 8 are attention, rest are conv — LoRA targets all linear layers)
max_seq_length: 512  # transcripts are short

# Reporting
steps_per_report: 10
steps_per_eval: 50
save_every: 100

# Paths
adapter_path: ./spoke/adapters-lfm2-t1
resume_adapter_file: ./spoke/adapters-lfm2-t1/adapters.safetensors

seed: 42
