# Spoke fine-tuning config for mlx_lm.lora
# Usage: mlx_lm.lora -c spoke/config.yaml

model: mlx-community/Qwen3-4B-Instruct-2507-bf16
train: true
data: ./spoke/data/final
fine_tune_type: dora
mask_prompt: true
optimizer: adamw
optimizer_config:
  adamw:
    weight_decay: 0.01

# LoRA hyperparameters
lora_parameters:
  rank: 8
  scale: 2.0        # alpha = rank * scale = 16
  dropout: 0.05

# Training
batch_size: 1
grad_accumulation_steps: 4  # effective batch = 4
iters: 200           # T8: DoRA + AdamW
learning_rate: 1e-5
num_layers: 16       # fine-tune top 16 transformer layers
max_seq_length: 512  # transcripts are short
grad_checkpoint: true  # reduce memory (~30-50% less at cost of speed)

# Reporting
steps_per_report: 10
steps_per_eval: 50
save_every: 100

# Paths
adapter_path: ./spoke/adapters-t8

seed: 42
