<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spoke — Benchmark Results</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2129; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --green-bg: #0d2818; --yellow: #d29922; --yellow-bg: #2d2006;
    --red: #f85149; --red-bg: #2d0b0b; --blue: #58a6ff; --blue-bg: #0d1d33;
    --purple: #bc8cff; --purple-bg: #1a0d2e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

  .container { max-width: 1600px; margin: 0 auto; padding: 24px; }

  header { margin-bottom: 24px; }
  header h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  header p { color: var(--muted); font-size: 14px; }

  /* Summary cards */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 20px; cursor: pointer; transition: all 0.15s;
  }
  .card:hover { border-color: var(--accent); }
  .card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .card-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .card-value { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .card-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 10px; overflow: hidden; }
  .card-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  /* Prompt toggle */
  .prompt-toggle { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
  .prompt-toggle label { font-size: 13px; color: var(--muted); margin-right: 4px; }
  .toggle-btn {
    padding: 5px 14px; font-size: 13px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    cursor: pointer; transition: all 0.15s; font-weight: 500;
  }
  .toggle-btn:hover { border-color: var(--accent); color: var(--text); }
  .toggle-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Example grid */
  .example {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 16px; overflow: hidden;
  }
  .example-header {
    display: flex; align-items: center; gap: 12px; padding: 12px 20px;
    border-bottom: 1px solid var(--border); background: var(--surface2);
  }
  .example-id { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 24px; }
  .category-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg); color: var(--accent);
    font-weight: 500; white-space: nowrap;
  }
  .example-input { font-size: 14px; color: var(--text); flex: 1; }

  .example-body { padding: 0; }

  .row-group { display: grid; grid-template-columns: 140px 1fr; border-bottom: 1px solid var(--border); }
  .row-group:last-child { border-bottom: none; }
  .row-label {
    padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.3px; display: flex; align-items: center;
    background: var(--bg); border-right: 1px solid var(--border);
  }
  .row-content { padding: 10px 16px; font-size: 14px; display: flex; align-items: center; gap: 8px; min-height: 42px; }
  .row-content.golden { background: rgba(63, 185, 80, 0.04); }
  .row-content code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; white-space: pre-wrap; word-break: break-word; }

  /* Score badges */
  .score {
    font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
  }
  .score-exact { background: var(--green-bg); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
  .score-semantic { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
  .score-partial { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(210,153,34,0.3); }
  .score-fail { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }

  .latency { font-size: 11px; color: var(--muted); margin-left: auto; font-variant-numeric: tabular-nums; }

  /* Diff highlighting */
  .diff-add { background: rgba(63, 185, 80, 0.15); padding: 1px 2px; border-radius: 2px; }
  .diff-del { background: rgba(248, 81, 73, 0.15); padding: 1px 2px; border-radius: 2px; text-decoration: line-through; }
  .diff-change { background: rgba(210, 153, 34, 0.15); padding: 1px 2px; border-radius: 2px; }

  /* Filter by score */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-bar label { font-size: 13px; color: var(--muted); }
  .filter-chip {
    padding: 4px 10px; font-size: 12px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--text); }
  .filter-chip.active { font-weight: 600; }
  .filter-chip.active[data-filter="all"] { background: var(--accent); color: #000; border-color: var(--accent); }
  .filter-chip.active[data-filter="exact"] { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .filter-chip.active[data-filter="semantic"] { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
  .filter-chip.active[data-filter="partial"] { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow); }
  .filter-chip.active[data-filter="fail"] { background: var(--red-bg); color: var(--red); border-color: var(--red); }

  .hidden { display: none !important; }

  /* Responsive */
  @media (max-width: 900px) {
    .row-group { grid-template-columns: 100px 1fr; }
  }
</style>
</head>

            <div class="row-content">
              <span class="score score-${mr.result.score}">${mr.result.score}</span>
              <code>${highlightDiff(mr.result.output, ex.ideal, mr.result.score)}</code>
              <span class="latency">${mr.result.gen_time_s.toFixed(2)}s</span>
            </div>
          </div>
        `).join('')}
      </div>
    `;

    el.appendChild(div);
  });
}

// ── Diff highlighting ────────────────────────────────────────
function highlightDiff(output, ideal, score) {
  if (score === 'exact') return escHtml(output);
  if (!output) return '<span class="diff-del">(empty)</span>';

  const o = escHtml(output);
  const i = escHtml(ideal);
  if (score === 'fail') return `<span class="diff-del">${o}</span>`;
  if (score === 'semantic') return `<span class="diff-change">${o}</span>`;

  // For partial, just show as-is with a subtle background
  return `<span class="diff-change">${o}</span>`;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Controls ─────────────────────────────────────────────────
function setPrompt(p) {
  currentPrompt = p;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.prompt === p));
  renderSummary();
  renderExamples();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  document.querySelectorAll('.example').forEach(ex => {
    if (f === 'all') { ex.classList.remove('hidden'); return; }
    const scores = ex.dataset.scores.split(',');
    ex.classList.toggle('hidden', !scores.includes(f));
  });
}

// ── Init ─────────────────────────────────────────────────────
renderSummary();
renderExamples();
</script>
</body>
</html>
