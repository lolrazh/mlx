<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spoke — Dataset Viewer</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
    --orange: #d18616; --pink: #f778ba; --cyan: #39d2c0; --blue: #58a6ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* Header */
  header { margin-bottom: 24px; }
  header h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  header p { color: var(--muted); font-size: 14px; }

  /* Stats bar */
  .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .stat { font-size: 13px; color: var(--muted); }
  .stat strong { color: var(--text); font-variant-numeric: tabular-nums; }

  /* Filter bar */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
  .filters label { font-size: 13px; color: var(--muted); margin-right: 4px; }
  .filter-btn {
    padding: 4px 10px; font-size: 12px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .filter-divider { width: 1px; height: 20px; background: var(--border); margin: 0 8px; }

  .split-btn { padding: 4px 10px; font-size: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.15s; }
  .split-btn:hover { border-color: var(--accent); }
  .split-btn.active { font-weight: 600; }
  .split-btn[data-split="seed"].active { background: #1a3a2a; color: var(--green); border-color: var(--green); }
  .split-btn[data-split="exclude"].active { background: #1a1a1a; color: var(--muted); border-color: var(--muted); }

  /* Search */
  .search-bar { display: flex; gap: 12px; margin-bottom: 20px; }
  .search-bar input {
    flex: 1; padding: 8px 12px; font-size: 14px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  /* Example cards */
  .example {
    display: grid; grid-template-columns: 40px 1fr 1fr 140px;
    gap: 0; border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 8px; background: var(--surface); overflow: hidden;
    transition: border-color 0.15s;
  }
  .example:hover { border-color: #484f58; }
  .example.highlight { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  .ex-id {
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--muted);
    background: rgba(255,255,255,0.02); border-right: 1px solid var(--border);
    padding: 12px 0;
  }
  .ex-input, .ex-ideal { padding: 12px 16px; font-size: 13px; line-height: 1.6; }
  .ex-input { border-right: 1px solid var(--border); }
  .ex-ideal { color: var(--green); }
  .ex-meta {
    display: flex; flex-direction: column; gap: 6px; padding: 10px 12px;
    border-left: 1px solid var(--border); align-items: flex-start;
  }

  /* Tags */
  .tag {
    display: inline-block; padding: 1px 7px; font-size: 10px; font-weight: 600;
    border-radius: 8px; white-space: nowrap; letter-spacing: 0.02em;
  }
  .tag-spell { background: #1a2d4a; color: var(--blue); }
  .tag-self-correction { background: #3a2f1a; color: var(--orange); }
  .tag-quote { background: #2d1a3a; color: var(--purple); }
  .tag-at-symbol { background: #1a3a2a; color: var(--green); }
  .tag-email { background: #1a3a35; color: var(--cyan); }
  .tag-formatting { background: #3a1a2a; color: var(--pink); }
  .tag-emoji { background: #3a351a; color: var(--yellow); }
  .tag-code-aware { background: #1a2a3a; color: #79c0ff; }
  .tag-prompt-injection { background: #3a1a1a; color: var(--red); }
  .tag-grammar { background: #1a1a2a; color: #a5b4c4; }
  .tag-passthrough { background: #1a1a1a; color: #555; }
  .tag-multi { background: #2a1a2a; color: #d2a8ff; }

  .split-badge {
    display: inline-block; padding: 1px 7px; font-size: 10px; font-weight: 700;
    border-radius: 8px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .split-seed { background: #1a3a2a; color: var(--green); }
  .split-exclude { background: #1a1a1a; color: #555; }

  .dup-badge { font-size: 10px; color: var(--red); font-weight: 600; }
  .note { font-size: 10px; color: var(--muted); font-style: italic; }

  /* Column headers */
  .col-headers {
    display: grid; grid-template-columns: 40px 1fr 1fr 140px;
    gap: 0; padding: 8px 0; font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .col-headers > div { padding: 0 16px; }
  .col-headers > div:first-child { padding: 0; text-align: center; }

  .count-badge { font-size: 11px; color: var(--muted); margin-left: 3px; }

  /* Responsive */
  @media (max-width: 900px) {
    .example { grid-template-columns: 30px 1fr; }
    .ex-ideal, .ex-meta { grid-column: 2; }
    .ex-ideal { border-top: 1px solid var(--border); border-right: none; }
    .ex-meta { flex-direction: row; flex-wrap: wrap; border-left: none; border-top: 1px solid var(--border); }
  }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab-btn {
    padding: 8px 16px; font-size: 13px; border-radius: 6px 6px 0 0;
    border: 1px solid transparent; border-bottom: none;
    background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface); }
  .tab-btn.active {
    background: var(--surface); color: var(--accent);
    border-color: var(--border); border-bottom-color: var(--surface);
    font-weight: 600;
  }
  .gen-badge {
    display: inline-block; padding: 1px 7px; font-size: 10px; font-weight: 700;
    border-radius: 8px; text-transform: uppercase; letter-spacing: 0.05em;
    background: #1a2d4a; color: var(--blue);
  }
  .ex-meta-gen { justify-content: center; }
  #result-count { font-size: 12px; color: var(--muted); margin-left: auto; }
</style>
</head>

const CAT_COLORS = {
  "spell-replace": "spell", "self-correction": "self-correction", "quote-unquote": "quote",
  "at-symbol": "at-symbol", "email": "email", "formatting": "formatting",
  "emoji": "emoji", "code-aware": "code-aware", "prompt-injection": "prompt-injection",
  "grammar": "grammar", "passthrough": "passthrough", "multi-command": "multi",
};

const ALL_CATS = Object.keys(CAT_COLORS);
const ALL_SPLITS = ["seed","exclude"];

let activeTab = "seeds";
let activeCats = new Set();
let activeSplits = new Set();

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function currentData() {
  return activeTab === "seeds" ? DATA : (GENERATED[activeTab] || []);
}

function renderTabs() {
  const tabs = document.getElementById("tabs");
  let html = `<button class="tab-btn ${activeTab==="seeds"?"active":""}" onclick="switchTab('seeds')">Seeds <span class="count-badge">${DATA.length}</span></button>`;
  Object.keys(GENERATED).forEach(key => {
    html += `<button class="tab-btn ${activeTab===key?"active":""}" onclick="switchTab('${key}')">${key} <span class="count-badge">${GENERATED[key].length}</span></button>`;
  });
  tabs.innerHTML = html;
}

function switchTab(tab) {
  activeTab = tab;
  activeCats = new Set();
  activeSplits = new Set();
  document.getElementById("search").value = "";
  renderTabs(); renderStats(); renderFilters(); render();
}

function renderStats() {
  const el = document.getElementById("stats");
  const data = currentData();
  if (activeTab === "seeds") {
    const bySplit = {}; ALL_SPLITS.forEach(s => bySplit[s] = 0);
    data.forEach(d => bySplit[d.split]++);
    el.innerHTML = `<span class="stat"><strong>${data.length}</strong> total</span><span class="stat"><strong>${bySplit.seed}</strong> seeds</span><span class="stat"><strong>${bySplit.exclude}</strong> excluded</span><span id="result-count"></span>`;
  } else {
    el.innerHTML = `<span class="stat"><strong>${data.length}</strong> generated · validated ✓</span><span id="result-count"></span>`;
  }
}

function renderFilters() {
  const el = document.getElementById("filters");
  if (activeTab !== "seeds") { el.innerHTML = ""; return; }
  let html = '<label>Category:</label>';
  ALL_CATS.forEach(cat => {
    const count = DATA.filter(d => d.cats.includes(cat)).length;
    if (!count) return;
    html += `<button class="filter-btn" data-cat="${cat}" onclick="toggleCat('${cat}')">${cat}<span class="count-badge">${count}</span></button>`;
  });
  html += '<div class="filter-divider"></div><label>Split:</label>';
  ALL_SPLITS.forEach(sp => {
    html += `<button class="split-btn" data-split="${sp}" onclick="toggleSplit('${sp}')">${sp}</button>`;
  });
  el.innerHTML = html;
  updateFilterUI();
}

function toggleCat(cat) {
  if (activeCats.has(cat)) activeCats.delete(cat); else activeCats.add(cat);
  updateFilterUI(); render();
}
function toggleSplit(sp) {
  if (activeSplits.has(sp)) activeSplits.delete(sp); else activeSplits.add(sp);
  updateFilterUI(); render();
}
function updateFilterUI() {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", activeCats.has(b.dataset.cat)));
  document.querySelectorAll(".split-btn").forEach(b => b.classList.toggle("active", activeSplits.has(b.dataset.split)));
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const el = document.getElementById("examples");
  const data = currentData();

  const filtered = data.filter(d => {
    if (activeTab === "seeds") {
      if (activeCats.size > 0 && !d.cats.some(c => activeCats.has(c))) return false;
      if (activeSplits.size > 0 && !activeSplits.has(d.split)) return false;
    }
    if (q) {
      if (q.startsWith("#")) {
        const num = parseInt(q.slice(1));
        if (!isNaN(num) && d.id !== num) return false;
      } else {
        const haystack = (d.input + " " + d.ideal + " " + (d.cats||[]).join(" ") + " " + (d.note||"")).toLowerCase();
        if (!haystack.includes(q)) return false;
      }
    }
    return true;
  });

  const rc = document.getElementById("result-count");
  if (rc) rc.textContent = filtered.length < data.length ? `${filtered.length} shown` : "";

  el.innerHTML = filtered.map(d => {
    const hl = q && q.startsWith("#") && d.id === parseInt(q.slice(1)) ? " highlight" : "";
    if (activeTab === "seeds") {
      const tags = d.cats.map(c => `<span class="tag tag-${CAT_COLORS[c]}">${c}</span>`).join(" ");
      const noteHtml = d.note ? `<span class="note">${escHtml(d.note)}</span>` : "";
      return `<div class="example${hl}">
        <div class="ex-id">${d.id}</div>
        <div class="ex-input">${escHtml(d.input)}</div>
        <div class="ex-ideal">${escHtml(d.ideal)}</div>
        <div class="ex-meta"><span class="split-badge split-${d.split}">${d.split}</span>${tags}${noteHtml}</div>
      </div>`;
    } else {
      return `<div class="example${hl}">
        <div class="ex-id">${d.id}</div>
        <div class="ex-input">${escHtml(d.input)}</div>
        <div class="ex-ideal">${escHtml(d.ideal)}</div>
        <div class="ex-meta ex-meta-gen"><span class="gen-badge">gen</span></div>
      </div>`;
    }
  }).join("");
}

document.getElementById("search").addEventListener("input", render);
renderTabs(); renderStats(); renderFilters(); render();

</script>
