# Spoke fine-tuning config for Llama 3.2 1B
# Usage: mlx_lm.lora -c spoke/config-llama.yaml

model: mlx-community/Llama-3.2-1B-Instruct-bf16
train: true
data: ./spoke/data/final
fine_tune_type: lora
mask_prompt: true

# LoRA hyperparameters
lora_parameters:
  rank: 16
  scale: 2.0        # alpha = rank * scale = 32
  dropout: 0.05

# Training
batch_size: 4
iters: 1000          # full run to find overfitting point
learning_rate: 1e-5
num_layers: 16       # all 16 layers
max_seq_length: 512

# Reporting
steps_per_report: 10
steps_per_eval: 100
save_every: 200

# Paths
adapter_path: ./spoke/adapters-llama

seed: 42
